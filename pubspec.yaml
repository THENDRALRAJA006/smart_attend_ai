name: smart_attend_ai
description: "SmartAttend AI — Production College Attendance System with BLE + ArcFace"
publish_to: 'none'

version: 3.0.0+5

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management, Routing & DI ─────────────────────────────────
  get: ^4.6.6

  # ── Networking ──────────────────────────────────────────────────────
  dio: ^5.4.1

  # ── BLE Proximity Scanning ──────────────────────────────────────────
  flutter_blue_plus: ^1.31.1

  # ── Camera (selfie + face registration) ────────────────────────────
  camera: ^0.10.5+9

  # ── QR Code Scanner (attendance fallback) ──────────────────────────
  mobile_scanner: ^5.0.0

  # ── Secure JWT Storage ──────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Permissions ─────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── QR Code Generation (Faculty) ────────────────────────────────────
  qr_flutter: ^4.1.0

  # ── Share QR Code (Faculty) ─────────────────────────────────────────
  share_plus: ^7.2.1

  # ── Date & Time Formatting ──────────────────────────────────────────
  intl: ^0.19.0

  # ── File Paths (camera frame buffer) ───────────────────────────────
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Uncomment to add custom fonts (requires assets in pubspec)
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
