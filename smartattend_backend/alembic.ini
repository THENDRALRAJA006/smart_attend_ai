# A generic, single database configuration for Alembic — MySQL 8.0 (AWS RDS)

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path so app imports work
prepend_sys_path = .

# NOTE: sqlalchemy.url is set dynamically in alembic/env.py from settings.DATABASE_URL
# Do NOT set it here — it will be overridden

# ── Logging ─────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
